<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 3 GGR472</title>
    <!-- mapbox GL JS -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css' rel='stylesheet' />
    <!-- mapbox geocoder plug in -->
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.css"
        type="text/css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Load the mapbox-gl-geocoder plugin. -->
    <script
        src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet"
        href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css"
        type="text/css">

    <!-- MAP CONTAINER -->
    <div id='my-map' class='map-container'></div>

    <!-- NAVIGATION ELEMENTS -->
    <div class='map-search-container'>
        <label class="option-label" for="geocoder">Click the button to return to full extent</label>
        <div id="geocoder" class="geocoder"></div>
        <button type="button" class="btn btn-primary btn-sm" id="returnbutton">Return to full extent</button>
    </div>

    <!-- LEGEND
    <div id='popn-legend' class='legend'>
        <h4>Population</h4>
        <div><span></span>0-100,000</div>
        <div><span></span>100,000-500,000</div>
        <div><span></span>500,000-1,000,000</div>
        <div><span></span>1,000,000-5,000,000</div>
        <div><span></span>>5,000,000</div>
    </div> -->

    <!-- LEGEND 2 -->
    <div id="legend" class="legend">
        <h4>Population</h4>
        <div><span></span>0-100,000</div>
        <div><span></span>100,000-500,000</div>
        <div><span></span>500,000-1,000,000</div>
        <div><span></span>1,000,000-5,000,000</div>
        <div><span></span>>5,000,000</div>
    </div>

    <!-- INTERACTIVITY -->
    <div class='map-data-container'>
        <label class="option-label" for="layercheck">Filter map view</label>

        <!-- Checkbox to show/hide layer -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="layercheck" checked>
            <label class="form-check-label" for="layercheck">Show layer</label>
        </div>

        <!-- Checkbox to show/hide legend -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="legendcheck"> <label class="form-check-label"
                for="legendcheck">Show legend</label>
        </div>

        <!-- <script src="script-events.js"></script>     -->
        <script src="script-expressions.js"></script>
        <!-- <script src="script.js"></script> -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

        <!-- SWITCH REFERENCE TO ALTERNATIVE JS SOURCE WHEN READY TO EXPLORE EVENTS -->
        <script src="script-events-adv.js"></script>


</body>

</html>
